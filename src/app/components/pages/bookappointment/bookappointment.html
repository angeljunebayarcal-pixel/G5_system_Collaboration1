<div class="appointment-wrapper">

  <div class="success-frame" *ngIf="appointmentSubmitted">
    <div class="success-content">
      <div class="check-icon">
        <i class="pi pi-check-circle"></i>
      </div>
      <h3>
        <i class="pi pi-check"></i>
        Appointment Submitted Successfully!
      </h3>
      <p>
        <i class="pi pi-send"></i>
        Your request has been sent to the selected Barangay Official.
      </p>
    </div>
  </div>

  <h2 class="page-title">
    <i class="pi pi-book nav-icon"></i>
    Book Appointment
  </h2>

  <form
    *ngIf="!appointmentSubmitted"
    #appointmentForm="ngForm"
    enctype="multipart/form-data"
    novalidate
    (ngSubmit)="bookAppointment(appointmentForm)">

    <div class="form-group">
      <label>
        <i class="pi pi-align-left"></i>
        Purpose
      </label>
      <textarea
        [(ngModel)]="details"
        name="details"
        placeholder="Enter purpose of appointment"
        required>
      </textarea>
    </div>

    <div class="form-group">
      <label>
        <i class="pi pi-file-pdf"></i>
        Upload Valid ID (PDF Only)
      </label>
      <input
        type="file"
        (change)="onFileChange($event)"
        accept="application/pdf">
      <small>
        <i class="pi pi-paperclip"></i>
        {{ uploadedFileName }}
      </small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>
          <i class="pi pi-calendar"></i>
          Request Date
        </label>
        <input type="date" [(ngModel)]="selectedDate" name="date" required>
      </div>

      <div class="form-group">
        <label>
          <i class="pi pi-clock"></i>
          Request Time
        </label>
        <input type="time" [(ngModel)]="selectedTime" name="time" required>
      </div>
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="isSubmitting">
      <i class="pi pi-send"></i>
      {{ isSubmitting ? 'Submitting...' : 'Submit Appointment' }}
    </button>

  </form>
</div>
