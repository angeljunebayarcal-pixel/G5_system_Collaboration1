<!-- MOBILE / TABLET ARROW TOGGLE -->
<button
  class="menu-toggle hamburger-toggle"
  type="button"
  *ngIf="isMobileOrTablet && !isSidebarOpen"
  (click)="toggleSidebar()"
  aria-label="Open Main Menu"
>
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- OVERLAY FOR TABLET / MOBILE -->
<div
  class="sidebar-overlay"
  [class.show]="isMobileOrTablet && isSidebarOpen"
  (click)="closeSidebar()"
></div>

<div
  class="sidenav"
  [class.mobile-hidden]="isMobileOrTablet && !isSidebarOpen"
  [class.mobile-open]="isMobileOrTablet && isSidebarOpen"
>
  <!-- Header -->
  <div class="nav-header">
    <div class="nav-header-inner">
      <div class="menu-badge">
        <span class="badge-line"></span>
        <span class="badge-line short"></span>
        <span class="badge-line"></span>
      </div>
      <p class="header-label">Main Menu</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <ul>
      <li>
        <a routerLink="/home/dashboard" routerLinkActive="active" (click)="handleNavClick()">
          <i class="pi pi-clipboard nav-icon"></i>
          <span class="nav-label">Dashboard</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a routerLink="/home/bookappointment" routerLinkActive="active" (click)="handleNavClick()">
          <i class="pi pi-book nav-icon"></i>
          <span class="nav-label">Book Appointments</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a routerLink="/home/certificaterequest" routerLinkActive="active" (click)="handleNavClick()">
          <i class="pi pi-folder nav-icon"></i>
          <span class="nav-label">Certificates Request</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a routerLink="/home/notification" routerLinkActive="active" (click)="handleNavClick()">
          <i class="pi pi-bell nav-icon"></i>
          <span class="nav-label">Notifications</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a routerLink="/home/profile" routerLinkActive="active" (click)="handleNavClick()">
          <i class="pi pi-user nav-icon"></i>
          <span class="nav-label">My Profile</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Divider -->
  <div class="nav-divider">
    <span></span>
  </div>

  <!-- Footer -->
  <div class="sidenav-footer">
    <div class="footer-status">
      <span class="status-dot"></span>
      <span class="status-text">System Online</span>
    </div>
    <p class="footer-copy">© 2026 Villanueva BOACRS</p>
  </div>
</div>
