<div class="topbar">

  <!-- Brand -->
  <div class="topbar-brand">
    <div class="logo-wrapper">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyivuRsYg8eNvsDnaM1FF_mwAY7Yrd4tl__A&s" alt="BOACRS Logo">
    </div>
    <div class="brand-text">
      <h1>BOACRS</h1>
      <span>Barangay Online Appointment & Certificate Request</span>
    </div>
  </div>

  <!-- Spacer -->
  <div class="topbar-sep" aria-hidden="true"></div>

  <!-- Actions -->
  <div class="topbar-action" *ngIf="isLoaded">

    <button
      class="notification-btn"
      type="button"
      (click)="goToNotifications($event)"
      aria-label="Notifications"
    >
      <i class="pi pi-bell"></i>
      <span class="notification-badge" *ngIf="notificationCount > 0">
        {{ notificationCount > 99 ? '99+' : notificationCount }}
      </span>
    </button>

    <div class="topbar-divider" aria-hidden="true"></div>

    <div class="user-dropdown">
      <button class="user-pill" type="button" (click)="toggleMenu($event)">
        <div class="user-avatar" *ngIf="!photoURL">
          <span>{{ initials }}</span>
        </div>
        <div class="user-avatar image-avatar" *ngIf="photoURL">
          <img [src]="photoURL" alt="Profile">
        </div>
        <div class="user-details">
          <span class="name">{{ displayName }}</span>
          <span class="role">
            <span class="role-dot"></span>
            {{ displayRole }}
          </span>
        </div>
        <i class="pi pi-chevron-down pill-chevron" [class.open]="menuOpen"></i>
      </button>

      <div class="dropdown-menu" *ngIf="menuOpen">
        <div class="dropdown-header">
          <div class="dh-avatar" *ngIf="!photoURL">{{ initials }}</div>
          <div class="dh-avatar image" *ngIf="photoURL">
            <img [src]="photoURL" alt="Profile">
          </div>
          <div class="dh-info">
            <span class="dh-name">{{ displayName }}</span>
            <span class="dh-role">{{ displayRole }}</span>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" type="button" (click)="goToSettings($event)">
          <span class="item-icon"><i class="pi pi-cog"></i></span>
          <span>Settings</span>
        </button>
        <button class="dropdown-item logout" type="button" (click)="logout($event)">
          <span class="item-icon"><i class="pi pi-sign-out"></i></span>
          <span>Logout</span>
        </button>
      </div>
    </div>

  </div>
</div>
