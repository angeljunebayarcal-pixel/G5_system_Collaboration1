<!-- MOBILE / TABLET ARROW TOGGLE -->
<button
  class="menu-toggle hamburger-toggle"
  type="button"
  *ngIf="isMobileOrTablet && !isSidebarOpen"
  (click)="toggleSidebar()"
  aria-label="Open Main Menu"
  [attr.aria-expanded]="isSidebarOpen"
  aria-controls="ofs-main-sidenav"
>
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- OVERLAY FOR TABLET / MOBILE -->
<div
  class="sidebar-overlay"
  [class.show]="isMobileOrTablet && isSidebarOpen"
  (click)="closeSidebar()"
></div>

<div
  id="ofs-main-sidenav"
  class="sidenav"
  [class.mobile-hidden]="isMobileOrTablet && !isSidebarOpen"
  [class.mobile-open]="isMobileOrTablet && isSidebarOpen"
>
  <!-- Left accent stripe -->
  <div class="sidenav-accent-stripe" aria-hidden="true"></div>

  <!-- Header -->
  <div class="nav-header">
    <div class="nav-header-inner">
      <div class="menu-badge">
        <i class="pi pi-slack"></i>
      </div>

      <p class="header-label">Main Menu</p>

    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <ul>
      <li class="nav-accent-blue">
        <a
          routerLink="/ofs-home/ofs-dashboard"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-clipboard nav-icon"></i>
          <span class="nav-label">Dashboard</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li class="nav-accent-violet">
        <a
          routerLink="/ofs-home/ofs-residentsdirectory"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-folder-open nav-icon"></i>
          <span class="nav-label">Residents Directory</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li class="nav-accent-green">
        <a
          routerLink="/ofs-home/ofs-createresidentsprofile"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-file-edit nav-icon"></i>
          <span class="nav-label">Create Resident Profile</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li class="nav-accent-orange">
        <a
          routerLink="/ofs-home/ofs-notification"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-bell nav-icon"></i>
          <span class="nav-label">Notifications</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li class="nav-accent-yellow">
        <a
          routerLink="/ofs-home/ofs-profile"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-user nav-icon"></i>
          <span class="nav-label">My Profile</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Divider -->
  <div class="nav-divider">
    <span></span>
  </div>

  <!-- Footer -->
  <div class="sidenav-footer">
    <div class="footer-status">
      <span class="status-dot"></span>
      <span class="status-text">System Online</span>
    </div>
    <p class="footer-copy">© 2026 Villanueva BOACRS</p>
  </div>
</div>
