<div class="topbar">
  <div class="topbar-left">
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyivuRsYg8eNvsDnaM1FF_mwAY7Yrd4tl__A&s" alt="Logo">
    </div>

    <div class="brand-text">
      <h1>BOACRS</h1>
      <span>Barangay Online Appointment & Certificate Request</span>
    </div>
  </div>

  <div class="topbar-center">
    <span class="center-line"></span>
  </div>

  <div class="topbar-action" *ngIf="isLoaded">
    <div class="user-dropdown">
      <button class="user-pill" type="button" (click)="toggleMenu($event)">
        <div class="user-avatar" *ngIf="!photoURL">
          <span>{{ initials }}</span>
          <div class="avatar-glow"></div>
        </div>

        <div class="user-avatar image-avatar" *ngIf="photoURL">
          <img [src]="photoURL" alt="Profile">
          <div class="avatar-glow"></div>
        </div>

        <div class="user-details">
          <span class="name">{{ displayName }}</span>
          <span class="role">
            <span class="role-dot"></span>
            {{ displayRole }}
          </span>
        </div>

        <span class="pill-arrow" [class.open]="menuOpen">›</span>
      </button>

      <div class="dropdown-menu" *ngIf="menuOpen">
        <button class="dropdown-item" type="button" (click)="goToSettings($event)">
          <i class="pi pi-cog"></i>
          <span>Settings</span>
        </button>

        <button class="dropdown-item logout" type="button" (click)="logout($event)">
          <i class="pi pi-sign-out"></i>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</div>
