<div class="resident-form-container">
  <h2 class="form-title">Create Resident Account</h2>

  <form class="resident-form" (ngSubmit)="createResident()" #residentForm="ngForm">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" [(ngModel)]="fullName" name="fullName" required />
    </div>

    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" [(ngModel)]="dob" name="dob" required />
    </div>

    <div class="form-group">
      <label>Gender</label>
      <div class="gender-options">
        <label>
          <input type="radio" name="gender" [(ngModel)]="gender" value="Male" required />
          Male
        </label>
        <label>
          <input type="radio" name="gender" [(ngModel)]="gender" value="Female" required />
          Female
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" [(ngModel)]="address" name="address" required />
    </div>

    <div class="form-group">
      <label for="contact">Contact Number</label>
      <input type="text" id="contact" [(ngModel)]="contact" name="contact" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" [(ngModel)]="email" name="email" required />
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" [(ngModel)]="username" name="username" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" [(ngModel)]="password" name="password" required />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    </div>

    <button type="submit" class="submit-btn" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating...' : 'Create Account' }}
    </button>
  </form>
</div>
