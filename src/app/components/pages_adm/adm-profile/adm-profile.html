<div class="profile-content">

  <h2 class="profile-title">Profile</h2>

  <div class="profile-tabs">
    <button
      type="button"
      class="tab"
      [class.active]="activeTab === 'personal'"
      (click)="switchTab($event, 'personal')">
      Personal Details
    </button>

    <button
      type="button"
      class="tab"
      [class.active]="activeTab === 'account'"
      (click)="switchTab($event, 'account')">
      Account Settings
    </button>
  </div>

  <div *ngIf="loading" class="profile-card">
    <p>Loading profile...</p>
  </div>

  <div class="profile-card" *ngIf="!loading && activeTab === 'personal'">
    <form (ngSubmit)="savePersonal()" #personalForm="ngForm">
      <div class="form-group">
        <span class="icon">👤</span>
        <div class="input-group">
          <label>Fullname</label>
          <input type="text" name="fullname" [(ngModel)]="personal.fullname">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">📍</span>
        <div class="input-group">
          <label>Address</label>
          <input type="text" name="address" [(ngModel)]="personal.address">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">📞</span>
        <div class="input-group">
          <label>Contact Number</label>
          <input type="text" name="contact" [(ngModel)]="personal.contact">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">✉️</span>
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" [(ngModel)]="personal.email">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">🧾</span>
        <div class="input-group">
          <label>Role</label>
          <input type="text" name="role" [(ngModel)]="personal.role" readonly>
        </div>
      </div>

      <button type="submit" class="save-btn">
        Save Personal Info
      </button>
    </form>
  </div>

  <div class="profile-card" *ngIf="!loading && activeTab === 'account'">
    <form (ngSubmit)="saveAccount()" #accountForm="ngForm">
      <div class="form-group">
        <span class="icon">🔑</span>
        <div class="input-group">
          <label>Current Password</label>
          <input
            type="password"
            name="currentPassword"
            [(ngModel)]="account.currentPassword">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">🆕</span>
        <div class="input-group">
          <label>New Password</label>
          <input
            type="password"
            name="newPassword"
            [(ngModel)]="account.newPassword">
        </div>
      </div>

      <div class="form-group">
        <span class="icon">✅</span>
        <div class="input-group">
          <label>Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="account.confirmPassword">
        </div>
      </div>

      <button type="submit" class="save-btn">
        Update Password
      </button>
    </form>
  </div>

</div>
