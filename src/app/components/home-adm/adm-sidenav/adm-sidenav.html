<!-- MOBILE / TABLET ARROW TOGGLE -->
<button
  class="menu-toggle hamburger-toggle"
  type="button"
  *ngIf="isMobileOrTablet && !isSidebarOpen"
  (click)="toggleSidebar()"
  aria-label="Open Admin Menu"
>
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- OVERLAY FOR TABLET / MOBILE -->
<div
  class="sidebar-overlay"
  [class.show]="isMobileOrTablet && isSidebarOpen"
  (click)="closeSidebar()"
></div>

<div
  class="sidenav"
  [class.mobile-hidden]="isMobileOrTablet && !isSidebarOpen"
  [class.mobile-open]="isMobileOrTablet && isSidebarOpen"
>
  <!-- Header -->
  <div class="nav-header">
    <div class="nav-header-inner">
      <div class="menu-badge">
        <span class="badge-line"></span>
        <span class="badge-line short"></span>
        <span class="badge-line"></span>
      </div>
      <p class="header-label">Admin Panel</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <ul>
      <li>
        <a
          routerLink="/home-adm/controlcenter"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-th-large nav-icon"></i>
          <span class="nav-label">Control Center</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a
          routerLink="/home-adm/userdirectory"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-users nav-icon"></i>
          <span class="nav-label">User Directory</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a
          routerLink="/home-adm/approvalqueue"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-check-square nav-icon"></i>
          <span class="nav-label">Approval Queue</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>

      <li>
        <a
          routerLink="/home-adm/adm-profile"
          routerLinkActive="active"
          (click)="handleNavClick()"
        >
          <i class="pi pi-user nav-icon"></i>
          <span class="nav-label">Profile</span>
          <span class="nav-arrow">›</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Divider -->
  <div class="nav-divider">
    <span></span>
  </div>

  <!-- Footer -->
  <div class="sidenav-footer">
    <div class="footer-status">
      <span class="status-dot"></span>
      <span class="status-text">Admin Online</span>
    </div>
    <p class="footer-copy">© 2026 Villanueva BOACRS</p>
  </div>
</div>
